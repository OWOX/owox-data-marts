name: E2E Browser Tests

on:
  pull_request:
    paths:
      - 'apps/backend/**'
      - 'apps/web/**'
      - 'packages/**'
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-browser:
    name: Browser E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --ignore-scripts --no-fund --loglevel error

      # Playwright webServer needs backend dist/. Build backend + its workspace deps.
      # Avoids building unrelated packages (e.g. @owox/internal-helpers) that may fail.
      - name: Build backend and dependencies
        run: npm run build -w @owox/connectors && npm run build -w @owox/backend

      - name: Install Playwright Chromium
        run: cd apps/web && npx playwright install --with-deps chromium

      - name: Run Browser E2E tests
        run: cd apps/web && npx playwright test
        env:
          CI: true
          NODE_ENV: test
          SERVER_TIMEOUT_MS: '180000'
          KEEP_ALIVE_TIMEOUT_MS: '180000'
          HEADERS_TIMEOUT_MS: '185000'

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

      - name: Upload Playwright traces
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: apps/web/test-results/
          retention-days: 7
