name: Test and Build @owox/docs

on:
  pull_request:
    # The docs site is assembled from markdown spread across the monorepo, so a build can break
    # from files far outside apps/docs. Keep this list in sync with the search patterns in
    # findMarkdownFiles() / findManifestFiles() in apps/docs/scripts/sync-docs.js.
    paths:
      - 'apps/docs/**'
      - 'apps/owox/CHANGELOG.md'
      - '*.md'
      - 'apps/**/*.md'
      - 'docs/**/*.md'
      - 'packages/**/*.md'
      - 'licenses/**/*.md'
      - 'packages/connectors/**/manifest.json'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build job
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    strategy:
      # If one check fails, the others will continue to run
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      # can't set --ignore-scripts because Astro uses postinstall
      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund --loglevel error

      - name: Run build
        run: npm run build -w @owox/docs
        env:
          NODE_ENV: production
