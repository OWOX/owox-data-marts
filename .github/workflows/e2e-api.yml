name: E2E API Tests

on:
  pull_request:
    paths:
      - 'apps/backend/**'
      - 'packages/**'
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-api:
    name: API E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --ignore-scripts --no-fund --loglevel error

      # ts-jest resolves TypeScript directly, so backend build is not needed.
      # Only @owox/connectors must be compiled (connector definitions used at runtime).
      # @owox/test-utils has no build step — ts-jest resolves it from source.
      - name: Build connectors package
        run: npm run build -w @owox/connectors

      - name: Run API E2E tests
        run: npm run test:e2e -w @owox/backend
        env:
          NODE_ENV: test
