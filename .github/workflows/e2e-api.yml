name: E2E API Tests

on:
  pull_request:
    paths:
      - 'apps/backend/**'
      - 'packages/**'
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-api:
    name: API E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # No --ignore-scripts: native modules (better-sqlite3) and workspace
      # postinstall hooks must run for E2E tests to work.
      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund --loglevel error

      - name: Build all workspace packages
        run: npm run build --workspaces --if-present

      - name: Run API E2E tests
        run: npm run test:e2e -w @owox/backend
        env:
          NODE_ENV: test
